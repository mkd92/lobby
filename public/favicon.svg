<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 90" fill="none">
  <style>
    path, line { stroke: #0f172a; }
    @media (prefers-color-scheme: dark) {
      path, line { stroke: #f8fafc; }
    }
  </style>
  <!-- Outer arch: straight sides + semicircular top -->
  <path d="M 14 82 L 14 46 A 36 36 0 0 1 86 46 L 86 82" stroke-width="5" stroke-linecap="butt"/>
  <!-- Inner arch: stops at sill level -->
  <path d="M 26 70 L 26 50 A 24 24 0 0 1 74 50 L 74 70" stroke-width="5" stroke-linecap="butt"/>
  <!-- Left sill ledge -->
  <line x1="14" y1="70" x2="26" y2="70" stroke-width="5" stroke-linecap="butt"/>
  <!-- Right sill ledge -->
  <line x1="74" y1="70" x2="86" y2="70" stroke-width="5" stroke-linecap="butt"/>
  <!-- Base line -->
  <line x1="4" y1="82" x2="96" y2="82" stroke-width="5" stroke-linecap="butt"/>
</svg>
